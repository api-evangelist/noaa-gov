name: NOAA — National Oceanic and Atmospheric Administration
description: The National Oceanic and Atmospheric Administration (NOAA) is the United States scientific and
  regulatory agency within the Department of Commerce charged with monitoring oceanic and atmospheric conditions,
  charting the seas, conducting deep-sea exploration, managing fishing and protection of marine mammals, and
  providing weather, climate, space weather, and ecosystem forecasts and warnings. NOAA's developer surface
  spans six line offices — the National Weather Service (NWS), the National Environmental Satellite, Data, and
  Information Service (NESDIS) including the National Centers for Environmental Information (NCEI), the
  National Ocean Service (NOS) including Tides & Currents (CO-OPS), the National Marine Fisheries Service
  (NMFS / NOAA Fisheries), the Office of Oceanic and Atmospheric Research (OAR), and the Office of Marine and
  Aviation Operations (OMAO). NOAA exposes free, open APIs at api.weather.gov, services.swpc.noaa.gov,
  api.tidesandcurrents.noaa.gov, ncei.noaa.gov/access, ERDDAP servers across line offices, the National Data
  Buoy Center (NDBC), and bulk forecast model output (GFS, GEFS, HRRR, GOES) through the NOAA Open Data
  Dissemination (NODD) program on AWS, GCP, and Azure.
