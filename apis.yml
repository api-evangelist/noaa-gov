        type: Documentation
  - aid: noaa-gov:ncei-access-data-service
    name: NCEI Access Data Service (v1)
    description: The National Centers for Environmental Information (NCEI) Access Data Service is the
      modern, token-free replacement for the legacy CDO web service. It exposes daily summaries (GHCND),
      hourly summaries, monthly summaries, normals, global summaries of the day, sea-surface temperature,
      and many archived climate datasets. Returns CSV, JSON, NetCDF, or PDF. Stable endpoint at
      ncei.noaa.gov/access/services/data/v1.
    humanURL: https://www.ncei.noaa.gov/support/access-data-service-api-user-documentation
    baseURL: https://www.ncei.noaa.gov/access/services/data/v1
    tags:
      - Climate
      - Historical
      - Stations
      - GHCND
    properties:
      - url: https://www.ncei.noaa.gov/support/access-data-service-api-user-documentation
        type: Documentation
      - url: https://www.ncei.noaa.gov/access
        type: Documentation
  - aid: noaa-gov:ncei-cdo-v2-api
    name: NCEI Climate Data Online (CDO) v2 API
    description: The legacy Climate Data Online v2 REST API exposes datasets, datatypes, stations, locations,
      data categories, and observation records. Requires a free token from ncei.noaa.gov/cdo-web/token in
      the `token` header. Enforces 5 requests/second and 10,000 requests/day per token. Being superseded
      by the Access Data Service v1, but still widely deployed.
    humanURL: https://www.ncdc.noaa.gov/cdo-web/webservices/v2
    baseURL: https://www.ncei.noaa.gov/cdo-web/api/v2
    tags:
      - Climate
      - Historical
      - Stations
      - Datasets
    properties:
      - url: https://www.ncdc.noaa.gov/cdo-web/webservices/v2
        type: Documentation
      - url: https://www.ncdc.noaa.gov/cdo-web/token
        type: Authentication
      - url: rate-limits/noaa-gov-rate-limits.yml
        type: RateLimits
  - aid: noaa-gov:ndbc-data-service
    name: National Data Buoy Center (NDBC) Web Data Service
    description: NDBC publishes real-time meteorological and oceanographic observations (the last 45 days)
      and historical archives from a global network of over 900 moored buoys, drifting buoys, C-MAN coastal
      stations, and partner stations. Data is exposed via HTTP file URLs, a THREDDS Data Server, and an
      OGC API Features collection. Observations include wave height, period, direction, sea surface
      temperature, wind, air pressure, salinity, and visibility.
    humanURL: https://www.ndbc.noaa.gov/docs/ndbc_web_data_guide.pdf
    baseURL: https://www.ndbc.noaa.gov/data
    tags:
      - Ocean
      - Marine
      - Buoys
      - Waves
      - Observations
    properties:
      - url: https://www.ndbc.noaa.gov/docs/ndbc_web_data_guide.pdf
        type: Documentation
      - url: https://www.ndbc.noaa.gov/faq/rt_data_access.shtml
        type: Documentation
      - url: https://www.ndbc.noaa.gov/thredds/catalog.html
        type: Documentation
  - aid: noaa-gov:erddap-coastwatch
    name: NOAA CoastWatch ERDDAP Server
    description: ERDDAP (Environmental Research Division Data Access Program) is a NOAA-funded, open-source
      server that unifies access to gridded (`griddap`) and tabular (`tabledap`) scientific datasets across
      OPeNDAP, WMS, and REST. CoastWatch, ERD/PFEG, NCEI, IOOS, and many NOAA line offices each operate
      ERDDAP instances exposing tens of thousands of datasets (satellite SST, chlorophyll, ocean color,
      altimetry, model output, in-situ observations) in CSV, JSON, NetCDF, MATLAB, Parquet, and image
      formats.
    humanURL: https://coastwatch.pfeg.noaa.gov/erddap/information.html
    baseURL: https://coastwatch.pfeg.noaa.gov/erddap
    tags:
      - Ocean
      - Satellite
      - Climate
      - Scientific Data
      - OPeNDAP
    properties:
      - url: https://coastwatch.pfeg.noaa.gov/erddap/information.html
        type: Documentation
      - url: https://coastwatch.pfeg.noaa.gov/erddap/rest.html
        type: Documentation
      - url: https://coastwatch.pfeg.noaa.gov/erddap/griddap/documentation.html
        type: Documentation
      - url: https://www.ncei.noaa.gov/erddap/
        type: BaseURL
      - url: https://coastwatch.noaa.gov/erddap/
        type: BaseURL
  - aid: noaa-gov:nodd-open-data
    name: NOAA Open Data Dissemination (NODD)
    description: NODD is NOAA's bulk-data dissemination program, providing free, low-latency public access
      to tens of terabytes per day of forecast model output, satellite imagery, radar, and observation
      archives through public-private partnerships with AWS, Google Cloud, and Microsoft Azure. Datasets
      include GFS, GEFS, HRRR, RAP, NAM, RRFS, GraphCast, GOES-16/17/18/19, NEXRAD Level II/III, and
      hundreds of climate archives — all addressable as S3/GCS/Azure Blob objects, without keys.
    humanURL: https://www.noaa.gov/information-technology/open-data-dissemination
    baseURL: https://noaa-gfs-bdp-pds.s3.amazonaws.com
    tags:
      - Open Data
      - Cloud
      - Bulk Data
      - Forecast Models
      - Satellite
      - Radar
    properties:
      - url: https://www.noaa.gov/information-technology/open-data-dissemination
        type: Documentation
      - url: https://www.noaa.gov/nodd/datasets
        type: Documentation
