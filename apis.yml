apis:
  - aid: noaa-gov:weather-gov-api
    name: National Weather Service API (api.weather.gov)
    description: The National Weather Service public REST API delivers real-time weather forecasts, alerts,
      observations, gridded forecast data, aviation weather products, and metadata for offices, zones, and
      radar stations across the United States and US territories. Responses default to GeoJSON with content
      negotiation for JSON-LD, CAP, ATOM, and DWML. No API key is required — only a unique User-Agent string
      identifying the calling application. Stable production endpoint at api.weather.gov, current spec version
      3.9.2.
    humanURL: https://www.weather.gov/documentation/services-web-api
    baseURL: https://api.weather.gov
    tags:
      - Weather
      - Forecast
      - Alerts
      - Observations
      - Aviation
      - Hydrology
      - GeoJSON
    properties:
      - url: https://www.weather.gov/documentation/services-web-api
        type: Documentation
      - url: https://api.weather.gov/openapi.json
        type: OpenAPI
      - url: openapi/weather-gov-api-openapi.json
        type: OpenAPI
      - url: https://github.com/weather-gov/api
        type: GitHubRepository
      - url: https://api.weather.gov
        type: BaseURL
      - url: https://www.weather.gov/documentation/services-web-api#/changelog
        type: Changelog
    contact:
      - FN: National Weather Service API Team
        url: https://www.weather.gov/about/contact-us
  - aid: noaa-gov:swpc-data-service
    name: Space Weather Prediction Center (SWPC) Data Service
    description: SWPC publishes solar wind, geomagnetic, X-ray flux, aurora forecast, radiation storm, and
      coronal mass ejection products through a static-file data service organised by format. JSON, text, and
      image feeds refresh on intervals from one minute (real-time solar wind) to daily summaries. No
      authentication required; products power aviation, satellite, power grid, GPS, and HAM radio operators.
      A modernization of the JSON catalog landed 2026-03-31 with old products deprecated 2026-04-30.
    humanURL: https://www.swpc.noaa.gov/content/data-access
    baseURL: https://services.swpc.noaa.gov
    tags:
      - Space Weather
      - Solar
      - Geomagnetic
      - Aurora
      - Real-Time
    properties:
      - url: https://www.swpc.noaa.gov/content/data-access
        type: Documentation
      - url: https://services.swpc.noaa.gov/json/
        type: BaseURL
      - url: https://services.swpc.noaa.gov/products/
        type: BaseURL
      - url: https://services.swpc.noaa.gov/text/
        type: BaseURL
      - url: https://services.swpc.noaa.gov/images/
        type: BaseURL
      - url: https://www.swpc.noaa.gov/news/scn-upcoming-json-modifications-and-changes
        type: Changelog
  - aid: noaa-gov:co-ops-data-api
    name: CO-OPS Data Retrieval API (Tides & Currents)
    description: The Center for Operational Oceanographic Products and Services (CO-OPS) Data API returns
      water-level observations, tide predictions, currents, meteorological observations, and operational
      forecast model output (NOS OFS nowcasts) for over 200 stations along US coasts, the Great Lakes, and
      US territories. Supports XML, JSON, and CSV with selectable datums (MLLW, MHHW, MSL, plus Great Lakes
      datums), units, and time zones. Free, no key required. Stable endpoint at api.tidesandcurrents.noaa.gov.
    humanURL: https://api.tidesandcurrents.noaa.gov/api/prod/
    baseURL: https://api.tidesandcurrents.noaa.gov/api/prod
    tags:
      - Ocean
      - Tides
      - Currents
      - Water Level
      - Marine
    properties:
      - url: https://api.tidesandcurrents.noaa.gov/api/prod/
        type: Documentation
      - url: https://tidesandcurrents.noaa.gov/api-helper/url-generator.html
        type: Sandbox
      - url: https://tidesandcurrents.noaa.gov/products.html
        type: Documentation
  - aid: noaa-gov:co-ops-metadata-api
    name: CO-OPS Metadata API (MDAPI v1)
    description: The CO-OPS Metadata API exposes station inventory, harmonic constituents, NOS PORTS station
      lists, flood thresholds, and high/low water station catalogs. Supports radius and bounding-box station
      discovery and returns JSON or XML. Stable endpoint at api.tidesandcurrents.noaa.gov/mdapi/prod.
    humanURL: https://api.tidesandcurrents.noaa.gov/mdapi/prod/
    baseURL: https://api.tidesandcurrents.noaa.gov/mdapi/prod/webapi
    tags:
      - Ocean
      - Metadata
      - Stations
      - PORTS
    properties:
      - url: https://api.tidesandcurrents.noaa.gov/mdapi/prod/
        type: Documentation
      - url: https://api.tidesandcurrents.noaa.gov/mdapi/prod/releasenotes.html
        type: Changelog
  - aid: noaa-gov:co-ops-derived-product-api
    name: CO-OPS Derived Product API (DPAPI v0.1)
    description: Derived products computed from historical CO-OPS water-level records — sea level trends,
      annual mean sea level reports, top-10 water levels, and extreme event summaries — exposed as a
      machine-readable companion to the data and metadata APIs.
    humanURL: https://api.tidesandcurrents.noaa.gov/dpapi/prod/
    baseURL: https://api.tidesandcurrents.noaa.gov/dpapi/prod
    tags:
