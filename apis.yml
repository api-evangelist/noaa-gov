        type: BaseURL
  - aid: noaa-gov:foss-landings-api
    name: NOAA Fisheries One Stop Shop (FOSS) ODS / ORDS
    description: The Fisheries One Stop Shop (FOSS) Operational Data Store, hosted on Oracle REST Data
      Services (ORDS), exposes US commercial fisheries landings, foreign trade, fishing gear, and species
      reference data. Cloud-hosted at apps-st.fisheries.noaa.gov with a public metadata catalog and
      paginated REST endpoints; suitable for fisheries economics, stock assessment, and policy analysis.
    humanURL: https://www.fisheries.noaa.gov/foss/f?p=215:35
    baseURL: https://apps-st.fisheries.noaa.gov/ods/foss
    tags:
      - Fisheries
      - Landings
      - Marine
      - Trade
      - Reference Data
    properties:
      - url: https://www.fisheries.noaa.gov/foss/f?p=215:35
        type: Documentation
      - url: https://apps-st.fisheries.noaa.gov/ods/foss/metadata-catalog/?offset=0&limit=100
        type: Documentation
      - url: https://www.fisheries.noaa.gov/inport/item/10574
        type: Documentation
  - aid: noaa-gov:inport-metadata-api
    name: NOAA InPort Metadata Catalog
    description: InPort is the authoritative metadata repository for NOAA Fisheries and the National Ocean
      Service and the NOAA-wide platform for data management plans. Catalog records describe data products,
      services, projects, and contacts; the public-facing site supports search and item retrieval, while
      web service endpoints support catalog-item path lookup and contact management. Public API endpoints
      are stabilising — full machine-to-machine surface is in beta.
    humanURL: https://www.fisheries.noaa.gov/inport/
    baseURL: https://www.fisheries.noaa.gov/inport
    tags:
      - Metadata
      - Catalog
      - Fisheries
      - Ocean
    properties:
      - url: https://www.fisheries.noaa.gov/inport/
        type: Documentation
      - url: https://www.fisheries.noaa.gov/inport/release-notes
        type: Changelog
