  - type: Features
    data:
      - Free and open weather, climate, ocean, fisheries, and space-weather APIs — no payment required and
        most endpoints require no API key
      - National Weather Service api.weather.gov — alerts (CAP), gridded forecasts, observations, aviation
        (SIGMETs/AIRMETs/TAFs), radar, zones, points, glossary — 66 documented endpoints in OpenAPI 3.9.2
      - GeoJSON, JSON-LD, CAP, ATOM, and DWML response formats via content negotiation on NWS API
      - Space Weather Prediction Center JSON, text, and image feeds for solar wind, geomagnetic, X-ray flux,
        aurora, and CME products at services.swpc.noaa.gov
      - CO-OPS Tides & Currents — data, metadata, and derived-product APIs covering 200+ coastal,
        Great Lakes, and territorial stations with selectable datums and units
      - NCEI Access Data Service v1 — token-free climate data access (GHCND, hourly/monthly summaries,
        normals, SST archives) in CSV, JSON, NetCDF
      - NCEI CDO v2 — token-based legacy climate API with 5 req/sec, 10k req/day rate limits
      - National Data Buoy Center (NDBC) — 900+ buoys and coastal stations with real-time + historical
        oceanographic and meteorological observations via HTTP, THREDDS, and OGC API Features
      - ERDDAP servers across CoastWatch, NCEI, IOOS, and line offices — unified gridded/tabular access via
        griddap and tabledap REST endpoints
      - NOAA Open Data Dissemination (NODD) — GFS, GEFS, HRRR, RAP, NAM, RRFS, GraphCast, GOES, NEXRAD on
        AWS, GCP, and Azure (S3/GCS/Azure Blob)
      - NOAA Fisheries FOSS Landings — Oracle REST Data Services exposing commercial landings, foreign
        trade, gear, and species data
      - InPort metadata catalog — authoritative data inventory for NOAA Fisheries and NOS, beta API for
        machine-to-machine catalog access
      - User-Agent header required on api.weather.gov for identification and security contact
      - Hundreds of NOAA GitHub orgs (NOAA-EMC, NOAA-GFDL, NOAA-GSL, NOAA-OWP, NOAA-PMEL, NOAA-PSL,
        weather-gov) publishing forecast model code, workflow systems, scientific libraries, and tools
    sources:
